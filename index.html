[data-theme="light"]{
  --pink:#F5C6D0;--pink-b:#E8A0B0;--pink-t:#8B4A5A;
  --purple:#D4A0D0;--purple-b:#C080BC;--purple-t:#6B3A68;
  --lav:#C6B8E8;--lav-b:#A898D8;--lav-t:#4A3A7A;
  --blue:#B8D8F0;--blue-b:#90C0E0;--blue-t:#3A5A7A;
  --peach:#F0D0A8;--peach-b:#E0B888;--peach-t:#7A5A2A;
  --mint:#C8E8C0;--mint-b:#A0D098;--mint-t:#3A6A3A;
  --rose:#F0B8C8;--rose-b:#E098B0;--rose-t:#7A3A5A;
  --lilac:#E8C8F0;--lilac-b:#D0A8E0;--lilac-t:#5A3A6A;
  --bg:#FFF8FA;--bg2:#FFF0F5;--bg3:#fff;--border:#F0D8E0;
  --text:#5A3A5A;--text2:#9A7A9A;--text3:#C0A0C0;
  --overlay:rgba(255,248,250,0.92);
  --bub-shine:rgba(255,255,255,0.5);
}
[data-theme="dark"]{
  --pink:#3D2A30;--pink-b:#6B4A58;--pink-t:#F5C6D0;
  --purple:#2E2238;--purple-b:#5A4068;--purple-t:#D4A0D0;
  --lav:#252040;--lav-b:#4A3A6A;--lav-t:#C6B8E8;
  --blue:#1E2A38;--blue-b:#3A5A78;--blue-t:#B8D8F0;
  --peach:#302418;--peach-b:#6A5030;--peach-t:#F0D0A8;
  --mint:#1E2E1E;--mint-b:#3A5A3A;--mint-t:#C8E8C0;
  --rose:#381E28;--rose-b:#6A3A50;--rose-t:#F0B8C8;
  --lilac:#2A2030;--lilac-b:#5A3A6A;--lilac-t:#E8C8F0;
  --bg:#1A1218;--bg2:#221A20;--bg3:#2A2028;--border:#3A2830;
  --text:#E8D0E0;--text2:#9A7A9A;--text3:#5A4058;
  --overlay:rgba(26,18,24,0.92);
  --bub-shine:rgba(255,255,255,0.12);
}

*{margin:0;padding:0;box-sizing:border-box;transition:background-color 0.35s ease,color 0.35s ease,border-color 0.35s ease}
body{background:var(--bg);color:var(--text);font-family:'Cutesy',sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;-webkit-tap-highlight-color:transparent}



.game-wrap{width:100%;max-width:480px;padding:20px 16px 30px;padding-top:max(20px,calc(env(safe-area-inset-top,0px) + 16px))}
.header{text-align:center;margin-bottom:clamp(10px,3vw,16px)}
.title{font-family:'Little Days';font-size:clamp(28px,8vw,36px);color:var(--purple-t);letter-spacing:1px}
.title span{color:var(--pink-t)}
.subtitle{font-family:'Cutesy';font-size:clamp(11px,3vw,13px);color:var(--text2);margin-top:2px}

.stats-row{display:flex;justify-content:center;gap:clamp(18px,6vw,28px);margin-bottom:clamp(8px,2vw,14px)}
.stat{text-align:center}
.stat-val{font-family:'Little Days';font-size:clamp(22px,6vw,28px);color:var(--text);line-height:1}
.stat-label{font-family:'Cutesy';font-size:11px;color:var(--text2);margin-top:2px}
.best-row{text-align:center;margin-bottom:clamp(8px,2vw,12px);min-height:18px}
.best-pill{font-family:'Little Days';font-size:12px;color:var(--peach-t);background:var(--peach);padding:3px 14px;border-radius:14px;display:inline-block}

.canvas-wrap{position:relative;width:100%;aspect-ratio:5/6;background:var(--bg2);border-radius:clamp(14px,4vw,20px);border:1.5px solid var(--border);overflow:hidden;cursor:crosshair;user-select:none;touch-action:manipulation;transition:background-color 0.35s ease,border-color 0.35s ease}

.bub{position:absolute;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.06s!important;-webkit-tap-highlight-color:transparent}
.bub:hover{transform:scale(1.12)!important}
@media(hover:none){.bub:active{transform:scale(0.92)!important}}
.bub .shine{position:absolute;background:var(--bub-shine);border-radius:50%}
.sparkle{position:absolute;pointer-events:none}

@keyframes popScale{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.4);opacity:0}}
.pop-ring{position:absolute;pointer-events:none;border-radius:50%;border:2px solid;animation:popScale .35s ease-out forwards}
@keyframes flyUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-40px) scale(.5);opacity:0}}
.sfly{position:absolute;pointer-events:none;font-family:'Little Days';font-size:clamp(14px,4vw,16px);animation:flyUp .55s ease-out forwards}

@keyframes newHsBounce{0%{transform:translate(-50%,-50%) scale(0) rotate(-8deg);opacity:0}50%{transform:translate(-50%,-50%) scale(1.1) rotate(3deg);opacity:1}70%{transform:translate(-50%,-50%) scale(.95) rotate(-1deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1}}
@keyframes newHsFade{0%{opacity:1}85%{opacity:1}100%{opacity:0}}
.hs-live-banner{position:absolute;top:50%;left:50%;z-index:20;pointer-events:none;text-align:center;animation:newHsBounce .5s cubic-bezier(0.34,1.56,0.64,1) forwards,newHsFade 2s ease forwards}
.hs-live-banner .hlb-text{font-family:'Little Days';font-size:clamp(18px,5vw,22px);color:var(--pink-t);background:var(--overlay);padding:8px 22px;border-radius:20px;border:2px solid var(--pink-b);white-space:nowrap}

.footer-row{display:flex;align-items:center;gap:8px;margin-top:clamp(8px,2vw,14px);flex-wrap:wrap}
.combo-bar{height:10px;border-radius:5px;background:var(--bg2);border:1.5px solid var(--border);flex:1;min-width:60px;overflow:hidden}
.combo-fill{height:100%;border-radius:5px;transition:width .3s,background-color .3s}
.combo-label{font-family:'Little Days';font-size:clamp(11px,3vw,13px);padding:4px 12px;border-radius:20px;white-space:nowrap}
.game-btn{font-family:'Cutesy';background:var(--pink);border:1.5px solid var(--pink-b);border-radius:20px;padding:8px 18px;font-size:clamp(12px,3.5vw,14px);color:var(--pink-t);cursor:pointer;-webkit-tap-highlight-color:transparent}
.game-btn:hover{transform:scale(1.03)}
.game-btn:active{transform:scale(0.97)}

.hs-panel{margin-top:clamp(12px,3vw,18px);background:var(--bg3);border:1.5px solid var(--border);border-radius:clamp(14px,4vw,18px);padding:clamp(12px,3vw,16px) clamp(14px,3vw,18px)}
.hs-title{font-family:'Little Days';font-size:clamp(15px,4vw,17px);color:var(--purple-t);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.hs-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-family:'Cutesy';font-size:clamp(12px,3vw,13px)}
.hs-row:last-child{border-bottom:none}
.hs-rank{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Little Days';font-size:13px;flex-shrink:0}
.hs-info{flex:1;margin-left:12px;color:var(--text)}
.hs-meta{font-size:11px;color:var(--text2)}
.hs-new{font-family:'Little Days';font-size:10px;color:var(--pink-t);background:var(--pink);padding:2px 8px;border-radius:10px;margin-left:6px}

.splash{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border-radius:20px;background:var(--bg2);z-index:10;padding:20px}
.splash-title{font-family:'Little Days';font-size:clamp(32px,10vw,42px);color:var(--purple-t)}
.splash-sub{font-family:'Cutesy';font-size:clamp(12px,3.5vw,14px);color:var(--text2);margin-bottom:14px;text-align:center}
.splash-btn{font-family:'Little Days';background:var(--pink);border:2px solid var(--pink-b);border-radius:28px;padding:12px 36px;font-size:clamp(16px,5vw,20px);color:var(--pink-t);cursor:pointer;-webkit-tap-highlight-color:transparent}
.splash-btn:hover{transform:scale(1.05)}
.splash-btn:active{transform:scale(0.95)}

.end-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);background:var(--overlay);z-index:10;padding:20px}

@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(500px) rotate(720deg);opacity:0}}
.confetti{position:absolute;pointer-events:none;top:-10px;z-index:21}

@keyframes crownBounce{0%{transform:scale(0) rotate(-15deg)}60%{transform:scale(1.2) rotate(5deg)}80%{transform:scale(.9) rotate(-2deg)}100%{transform:scale(1) rotate(0deg)}}
.end-crown{animation:crownBounce .6s cubic-bezier(0.34,1.56,0.64,1) forwards;margin-bottom:6px}
@keyframes scoreCount{0%{transform:scale(1.3);opacity:0}100%{transform:scale(1);opacity:1}}
.end-score-anim{animation:scoreCount .4s ease-out .3s both}
.end-badge{font-family:'Little Days';font-size:clamp(14px,4vw,16px);color:var(--purple-t);margin-bottom:4px}
.end-score{font-family:'Little Days';font-size:clamp(40px,12vw,56px);color:var(--text);line-height:1}
.end-label{font-family:'Cutesy';font-size:clamp(12px,3.5vw,14px);color:var(--text2);margin-top:4px}
.end-meta{font-family:'Cutesy';font-size:12px;color:var(--text3);margin-top:6px}

.end-btns{display:flex;gap:10px;margin-top:18px;align-items:center}
@keyframes sharePopIn{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.15) rotate(5deg);opacity:1}80%{transform:scale(0.9) rotate(-2deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes playAgainFloat{0%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-3px) rotate(-8deg)}50%{transform:translateY(0) rotate(0deg)}75%{transform:translateY(-2px) rotate(6deg)}100%{transform:translateY(0) rotate(0deg)}}
@keyframes shareEndFloat{0%{transform:translateY(0) rotate(0deg)}30%{transform:translateY(-4px) rotate(10deg)}60%{transform:translateY(0) rotate(0deg)}80%{transform:translateY(-2px) rotate(-6deg)}100%{transform:translateY(0) rotate(0deg)}}
.play-again-btn{font-family:'Little Days';background:var(--pink);border:1.5px solid var(--pink-b);border-radius:24px;padding:10px 22px;font-size:16px;color:var(--pink-t);cursor:pointer;display:inline-flex;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent;animation:sharePopIn .5s cubic-bezier(0.34,1.56,0.64,1) .3s both}
.play-again-btn:hover{transform:scale(1.05)}
.play-again-btn:active{transform:scale(0.95)}
.play-again-btn svg{flex-shrink:0;animation:playAgainFloat 2.5s ease-in-out infinite}
.play-again-btn:hover svg{animation:playAgainFloat 0.5s ease-in-out infinite}
.share-btn{font-family:'Little Days';background:var(--lav);border:1.5px solid var(--lav-b);border-radius:24px;padding:10px 22px;font-size:16px;color:var(--lav-t);cursor:pointer;display:inline-flex;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent;animation:sharePopIn .5s cubic-bezier(0.34,1.56,0.64,1) .5s both}
.share-btn:hover{transform:scale(1.05)}
.share-btn:active{transform:scale(0.95)}
.share-btn svg{flex-shrink:0;animation:shareEndFloat 3s ease-in-out infinite}
.share-btn:hover svg{animation:shareEndFloat 0.5s ease-in-out infinite}
@keyframes copiedPop{0%{transform:translate(-50%,-100%) scale(0);opacity:0}50%{transform:translate(-50%,-100%) scale(1.1);opacity:1}100%{transform:translate(-50%,-100%) scale(1);opacity:1}}
@keyframes copiedFade{0%{opacity:1}80%{opacity:1}100%{opacity:0}}
.copied-toast{position:fixed;top:20px;left:50%;z-index:100;font-family:'Little Days';font-size:14px;color:var(--mint-t);background:var(--mint);padding:8px 20px;border-radius:20px;border:1.5px solid var(--mint-b);pointer-events:none;animation:copiedPop .3s cubic-bezier(0.34,1.56,0.64,1) forwards,copiedFade 2s ease forwards;white-space:nowrap}

.mute-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;z-index:5;color:var(--text2);-webkit-tap-highlight-color:transparent}
.mute-btn:hover,.mute-btn:active{background:var(--pink);color:var(--pink-t)}

.shape-circle{border-radius:50%}
.shape-heart,.shape-star,.shape-flower,.shape-moon{border-radius:0;background:none!important;border:none!important}
.shape-diamond{border-radius:5px}

.bmat-footer{text-align:center;margin-top:clamp(16px,4vw,22px);padding:16px 0 max(16px,env(safe-area-inset-bottom,16px));border-top:1px solid var(--border)}
.footer-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

@keyframes teaFloat{0%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-3px) rotate(-6deg)}50%{transform:translateY(0) rotate(0deg)}75%{transform:translateY(-2px) rotate(5deg)}100%{transform:translateY(0) rotate(0deg)}}
@keyframes shareFloat{0%{transform:translateY(0) rotate(0deg)}30%{transform:translateY(-4px) rotate(8deg)}60%{transform:translateY(0) rotate(0deg)}80%{transform:translateY(-2px) rotate(-5deg)}100%{transform:translateY(0) rotate(0deg)}}

.bmat-link{display:inline-flex;align-items:center;gap:8px;font-family:'Little Days';font-size:clamp(13px,4vw,15px);color:var(--purple-t);text-decoration:none;padding:10px 24px;border:1.5px solid var(--purple-b);border-radius:24px;background:var(--purple);-webkit-tap-highlight-color:transparent}
.bmat-link:hover{opacity:0.85;transform:scale(1.03)}
.bmat-link svg{flex-shrink:0;animation:teaFloat 2.5s ease-in-out infinite}
.bmat-link:hover svg{animation:teaFloat 0.6s ease-in-out infinite}
.share-footer-btn{display:inline-flex;align-items:center;gap:8px;font-family:'Little Days';font-size:clamp(13px,4vw,15px);color:var(--lav-t);padding:10px 24px;border:1.5px solid var(--lav-b);border-radius:24px;background:var(--lav);cursor:pointer;-webkit-tap-highlight-color:transparent}
.share-footer-btn:hover{opacity:0.85;transform:scale(1.03)}
.share-footer-btn:active{transform:scale(0.97)}
.share-footer-btn svg{flex-shrink:0;animation:shareFloat 3s ease-in-out infinite}
.share-footer-btn:hover svg{animation:shareFloat 0.5s ease-in-out infinite}
.bmat-sub{font-family:'Cutesy';font-size:12px;color:var(--text2);margin-top:8px}

.theme-toggle{position:fixed;top:max(10px,env(safe-area-inset-top,10px));right:max(10px,env(safe-area-inset-right,10px));width:34px;height:34px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;font-size:16px;color:var(--text2);-webkit-tap-highlight-color:transparent}
.theme-toggle:hover{background:var(--lilac);color:var(--lilac-t)}
</style>
</head>
<body>

<div class="theme-toggle" id="themeToggle" title="Toggle dark mode"></div>
<div class="game-wrap">
  <div class="header">
    <div class="title">bubble pop<span>!</span></div>
    <div class="subtitle">Intent Labs</div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-val" id="score">0</div><div class="stat-label">score</div></div>
    <div class="stat"><div class="stat-val" id="timer">30</div><div class="stat-label">sec</div></div>
  </div>
  <div class="best-row" id="bestRow"></div>
  <div class="canvas-wrap" id="canvas">
    <div class="splash" id="splash">
      <div class="splash-title">bubble pop!</div>
      <div class="splash-sub">pop shapes, build combos, chase your high score</div>
      <button class="splash-btn" id="splashBtn">let's go!</button>
    </div>
  </div>
  <div class="footer-row">
    <div class="combo-bar"><div class="combo-fill" id="comboFill" style="width:0%;background:var(--purple)"></div></div>
    <span class="combo-label" id="comboLabel" style="background:var(--purple);color:var(--purple-t)">0x combo</span>
    <button class="game-btn" id="startBtn" style="display:none;">play again</button>
  </div>
  <div class="hs-panel">
    <div class="hs-title">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M8 1l2.1 4.3 4.7.7-3.4 3.3.8 4.7L8 11.8 3.8 14l.8-4.7L1.2 6l4.7-.7z" fill="var(--peach)" stroke="var(--peach-b)" stroke-width="1"/></svg>
      high scores
    </div>
    <div id="hsList"><div style="font-size:12px;color:var(--text2);padding:4px 0">play a round to set your first score!</div></div>
  </div>
  <div class="bmat-footer">
    <div class="footer-btns">
      <a href="https://buymeacoffee.com/sophiann" target="_blank" class="bmat-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M5 12a2 2 0 01-2-2V8a2 2 0 012-2h14a2 2 0 012 2v2a2 2 0 01-2 2M5 12v6a2 2 0 002 2h10a2 2 0 002-2v-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 6V4M14 6V4M12 6V3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        buy me a tea
      </a>
      <button class="share-footer-btn" onclick="shareGame()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        share game
      </button>
    </div>
    <div class="bmat-sub">made by Sophia N</div>
  </div>
</div>

<script>
(function(){
  var html=document.documentElement;
  var themeBtn=document.getElementById('themeToggle');
  var metaTheme=document.getElementById('metaTheme');
  var saved=localStorage.getItem('bpTheme');
  var isDark=saved?saved==='dark':false;

  function applyTheme(){
    html.setAttribute('data-theme',isDark?'dark':'light');
    themeBtn.textContent=isDark?'\u2600':'\u263E';
    themeBtn.title=isDark?'Switch to light mode':'Switch to dark mode';
    metaTheme.setAttribute('content',isDark?'#1A1218':'#FFF8FA');
  }
  applyTheme();
  themeBtn.addEventListener('click',function(){isDark=!isDark;localStorage.setItem('bpTheme',isDark?'dark':'light');applyTheme()});
  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(e){if(!localStorage.getItem('bpTheme')){isDark=e.matches;applyTheme()}});

  var LIGHT_COLORS=[
    {bg:'#F5C6D0',border:'#E8A0B0',text:'#8B4A5A',spark:['#F5C6D0','#E8A0B0','#FFD6E0','#fff']},
    {bg:'#D4A0D0',border:'#C080BC',text:'#6B3A68',spark:['#D4A0D0','#E8C8F0','#C080BC','#fff']},
    {bg:'#C6B8E8',border:'#A898D8',text:'#4A3A7A',spark:['#C6B8E8','#DDD0F8','#A898D8','#fff']},
    {bg:'#B8D8F0',border:'#90C0E0',text:'#3A5A7A',spark:['#B8D8F0','#D0E8FF','#90C0E0','#fff']},
    {bg:'#F0D0A8',border:'#E0B888',text:'#7A5A2A',spark:['#F0D0A8','#FFE8C0','#E0B888','#fff']},
    {bg:'#C8E8C0',border:'#A0D098',text:'#3A6A3A',spark:['#C8E8C0','#E0F8D8','#A0D098','#fff']},
    {bg:'#F0B8C8',border:'#E098B0',text:'#7A3A5A',spark:['#F0B8C8','#FFD0E0','#E098B0','#fff']},
    {bg:'#E8C8F0',border:'#D0A8E0',text:'#5A3A6A',spark:['#E8C8F0','#F8E0FF','#D0A8E0','#fff']}
  ];
  var DARK_COLORS=[
    {bg:'#5A3040',border:'#8B4A5A',text:'#F5C6D0',spark:['#8B4A5A','#F5C6D0','#E8A0B0','#3D2A30']},
    {bg:'#402850',border:'#6B3A68',text:'#D4A0D0',spark:['#6B3A68','#D4A0D0','#C080BC','#2E2238']},
    {bg:'#302050',border:'#4A3A7A',text:'#C6B8E8',spark:['#4A3A7A','#C6B8E8','#A898D8','#252040']},
    {bg:'#203040',border:'#3A5A7A',text:'#B8D8F0',spark:['#3A5A7A','#B8D8F0','#90C0E0','#1E2A38']},
    {bg:'#403020',border:'#7A5A2A',text:'#F0D0A8',spark:['#7A5A2A','#F0D0A8','#E0B888','#302418']},
    {bg:'#203820',border:'#3A6A3A',text:'#C8E8C0',spark:['#3A6A3A','#C8E8C0','#A0D098','#1E2E1E']},
    {bg:'#402030',border:'#7A3A5A',text:'#F0B8C8',spark:['#7A3A5A','#F0B8C8','#E098B0','#381E28']},
    {bg:'#352040',border:'#5A3A6A',text:'#E8C8F0',spark:['#5A3A6A','#E8C8F0','#D0A8E0','#2A2030']}
  ];
  function getColors(){return isDark?DARK_COLORS:LIGHT_COLORS}
  var SHAPES=['circle','circle','circle','heart','star','diamond','flower','moon'];
  var CONFETTI_COLORS=['#F5C6D0','#D4A0D0','#C6B8E8','#B8D8F0','#F0D0A8','#C8E8C0','#F0B8C8','#E8C8F0','#FFD6E0','#DDD0F8'];

  var canvas=document.getElementById('canvas');
  var scoreEl=document.getElementById('score');
  var timerEl=document.getElementById('timer');
  var bestRow=document.getElementById('bestRow');
  var comboFill=document.getElementById('comboFill');
  var comboLabel=document.getElementById('comboLabel');
  var startBtn=document.getElementById('startBtn');
  var hsList=document.getElementById('hsList');
  var splashBtn=document.getElementById('splashBtn');
  var splash=document.getElementById('splash');

  var score=0,timeLeft=30,combo=0,maxCombo=0,difficulty=1;
  var gameInterval,spawnTimeout,gameActive=false;
  var bubbles=[];
  var highScores=JSON.parse(localStorage.getItem('bpScores3')||'[]');
  var muted=localStorage.getItem('bpMuted')==='1';
  var hsBeaten=false;
  var currentBest=highScores.length?highScores[0].score:0;

  var AudioCtx=window.AudioContext||window.webkitAudioContext;
  var actx;
  function ensureAudio(){if(!actx)actx=new AudioCtx();if(actx.state==='suspended')actx.resume()}
  function playPop(p){if(muted)return;try{ensureAudio();var t=actx.currentTime;var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.setValueAtTime(300+Math.random()*100,t);o.frequency.exponentialRampToValueAtTime(900+Math.random()*300,t+0.04);o.frequency.exponentialRampToValueAtTime(400,t+0.1);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+0.12)}catch(e){}}
  function playCombo(){if(muted)return;try{ensureAudio();var t=actx.currentTime;[0,0.06,0.12].forEach(function(d,i){var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.setValueAtTime(400+i*100,t+d);o.frequency.exponentialRampToValueAtTime(1000+i*200,t+d+0.04);o.frequency.exponentialRampToValueAtTime(500+i*100,t+d+0.1);g.gain.setValueAtTime(0.12,t+d);g.gain.exponentialRampToValueAtTime(0.001,t+d+0.1);o.connect(g);g.connect(actx.destination);o.start(t+d);o.stop(t+d+0.12)})}catch(e){}}
  function playHighScore(){if(muted)return;try{ensureAudio();var t=actx.currentTime;[0,0.08,0.16,0.24,0.32].forEach(function(d,i){var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.setValueAtTime(400+i*80,t+d);o.frequency.exponentialRampToValueAtTime(1200+i*150,t+d+0.05);o.frequency.exponentialRampToValueAtTime(600+i*80,t+d+0.15);g.gain.setValueAtTime(0.1,t+d);g.gain.exponentialRampToValueAtTime(0.001,t+d+0.15);o.connect(g);g.connect(actx.destination);o.start(t+d);o.stop(t+d+0.15)})}catch(e){}}
  function playGameOver(){if(muted)return;try{ensureAudio();var t=actx.currentTime;[800,600,400,250].forEach(function(f,i){var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.setValueAtTime(f,t+i*0.12);o.frequency.exponentialRampToValueAtTime(f*1.5,t+i*0.12+0.03);o.frequency.exponentialRampToValueAtTime(f*0.4,t+i*0.12+0.15);g.gain.setValueAtTime(0.1,t+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.15);o.connect(g);g.connect(actx.destination);o.start(t+i*0.12);o.stop(t+i*0.12+0.15)})}catch(e){}}
  function rr(a,b){return Math.random()*(b-a)+a}

  function makeSVG(shape,size,color){
    if(shape==='heart') return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 32 32" fill="'+color.bg+'" xmlns="http://www.w3.org/2000/svg"><path d="M16 28S2 20 2 11a7 7 0 0114-1 7 7 0 0114 1c0 9-14 17-14 17z" stroke="'+color.border+'" stroke-width="1.2"/><ellipse cx="10" cy="10" rx="3" ry="2.5" fill="rgba(255,255,255,0.2)" transform="rotate(-20 10 10)"/></svg>';
    if(shape==='star') return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 32 32" fill="'+color.bg+'" xmlns="http://www.w3.org/2000/svg"><path d="M16 2l4.2 8.6 9.4 1.4-6.8 6.6 1.6 9.4L16 23.6 7.6 28l1.6-9.4L2.4 12l9.4-1.4z" stroke="'+color.border+'" stroke-width="1"/><circle cx="12" cy="11" r="2.5" fill="rgba(255,255,255,0.2)"/></svg>';
    if(shape==='flower') return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><ellipse cx="16" cy="8" rx="5" ry="6" fill="'+color.bg+'" stroke="'+color.border+'" stroke-width="0.8"/><ellipse cx="16" cy="24" rx="5" ry="6" fill="'+color.bg+'" stroke="'+color.border+'" stroke-width="0.8"/><ellipse cx="8" cy="16" rx="6" ry="5" fill="'+color.bg+'" stroke="'+color.border+'" stroke-width="0.8"/><ellipse cx="24" cy="16" rx="6" ry="5" fill="'+color.bg+'" stroke="'+color.border+'" stroke-width="0.8"/><circle cx="16" cy="16" r="4.5" fill="'+color.border+'"/><circle cx="15" cy="14.5" r="1.5" fill="rgba(255,255,255,0.2)"/></svg>';
    if(shape==='moon') return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 32 32" fill="'+color.bg+'" xmlns="http://www.w3.org/2000/svg"><path d="M22 16A10 10 0 0112 6a10 10 0 100 20 10 10 0 0010-10z" stroke="'+color.border+'" stroke-width="1"/><circle cx="17" cy="10" r="1.5" fill="rgba(255,255,255,0.2)"/></svg>';
    return null;
  }

  function showBestPill(){if(highScores.length)bestRow.innerHTML='<span class="best-pill">best: '+highScores[0].score+'</span>';else bestRow.innerHTML=''}
  function showHsLiveBanner(){var b=document.createElement('div');b.className='hs-live-banner';b.innerHTML='<div class="hlb-text">new high score!</div>';canvas.appendChild(b);setTimeout(function(){b.remove()},2000)}
  function spawnConfetti(container){for(var i=0;i<40;i++){var c=document.createElement('div');c.className='confetti';var sz=rr(6,12);var isC=Math.random()>.5;c.style.cssText='left:'+rr(0,100)+'%;width:'+sz+'px;height:'+(isC?sz:sz*1.4)+'px;background:'+CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)]+';border-radius:'+(isC?'50%':'2px')+';animation:confettiFall '+rr(1.2,2.5)+'s ease-in '+rr(0,0.5)+'s forwards;';container.appendChild(c)}}

  function spawnBubble(){
    if(!gameActive)return;
    var colors=getColors();
    var baseSize=Math.max(26,56-difficulty*2);var size=Math.round(rr(baseSize*.7,baseSize*1.3));
    var cw=canvas.clientWidth,ch=canvas.clientHeight;
    var x=rr(6,cw-size-6),y=rr(6,ch-size-6);
    var color=colors[Math.floor(Math.random()*colors.length)];
    var shape=SHAPES[Math.floor(Math.random()*SHAPES.length)];
    var points=Math.max(1,Math.round((60-size)/5)+Math.floor(difficulty/2));
    var el=document.createElement('div');el.className='bub';
    var svg=makeSVG(shape,size,color);
    if(svg){el.classList.add('shape-'+shape);el.style.cssText='left:'+x+'px;top:'+y+'px;width:'+size+'px;height:'+size+'px;';el.innerHTML=svg}
    else if(shape==='diamond'){el.classList.add('shape-diamond');var ds=Math.round(size*.75);el.style.cssText='left:'+(x+size*.12)+'px;top:'+(y+size*.12)+'px;width:'+ds+'px;height:'+ds+'px;background:'+color.bg+';border:1.5px solid '+color.border+';'}
    else{el.classList.add('shape-circle');el.style.cssText='left:'+x+'px;top:'+y+'px;width:'+size+'px;height:'+size+'px;background:'+color.bg+';border:1.5px solid '+color.border+';';var sh=document.createElement('div');sh.className='shine';sh.style.cssText='width:'+(size*.28)+'px;height:'+(size*.28)+'px;top:'+(size*.14)+'px;left:'+(size*.17)+'px;border-radius:50%;';el.appendChild(sh)}
    var lifespan=Math.max(800,3200-difficulty*150);
    el.addEventListener('click',function(e){e.stopPropagation();popBubble(el,color,points,x+size/2,y+size/2,size)});
    canvas.appendChild(el);
    var bObj={el:el,timer:setTimeout(function(){missedBubble(el,bObj)},lifespan)};
    bubbles.push(bObj);
    el.style.transform=shape==='diamond'?'rotate(45deg) scale(0)':'scale(0)';
    el.style.transition='transform 0.22s cubic-bezier(0.34,1.56,0.64,1)';
    requestAnimationFrame(function(){el.style.transform=shape==='diamond'?'rotate(45deg) scale(1)':'scale(1)'});
  }

  function missedBubble(el,bObj){if(!el.parentNode)return;el.style.transition='transform .15s,opacity .15s';el.style.transform=(el.classList.contains('shape-diamond')?'rotate(45deg) ':'')+'scale(0)';el.style.opacity='0';setTimeout(function(){if(el.parentNode)el.remove()},160);bubbles=bubbles.filter(function(b){return b!==bObj});if(gameActive){combo=0;updateCombo()}}
  function spawnSparkles(cx,cy,color){var count=12+Math.floor(Math.random()*8);for(var i=0;i<count;i++){var sp=document.createElement('div');sp.className='sparkle';var sz=rr(2,8);var angle=rr(0,Math.PI*2);var dist=rr(18,65);var dx=Math.cos(angle)*dist,dy=Math.sin(angle)*dist;var dur=rr(.28,.55);var c=color.spark[Math.floor(Math.random()*color.spark.length)];sp.style.cssText='left:'+(cx-sz/2)+'px;top:'+(cy-sz/2)+'px;width:'+sz+'px;height:'+sz+'px;background:'+c+';border-radius:'+(Math.random()>.6?'2px':'50%')+';';sp.animate([{transform:'translate(0,0) scale(1)',opacity:1},{transform:'translate('+dx+'px,'+dy+'px) scale(0.1)',opacity:0}],{duration:dur*1000,easing:'ease-out',fill:'forwards'});canvas.appendChild(sp);(function(s,d){setTimeout(function(){s.remove()},d*1000+50)})(sp,dur)}}

  function popBubble(el,color,points,cx,cy,size){
    combo++;if(combo>maxCombo)maxCombo=combo;
    var mult=Math.min(combo,5);var fp=points*mult;
    score+=fp;scoreEl.textContent=score;updateCombo();
    if(!hsBeaten&&currentBest>0&&score>currentBest){hsBeaten=true;playHighScore();showHsLiveBanner()}
    difficulty=1+Math.floor(score/80);
    playPop(Math.random()*3);if(combo>0&&combo%5===0)playCombo();
    spawnSparkles(cx,cy,color);
    var ring=document.createElement('div');ring.className='pop-ring';ring.style.cssText='left:'+(cx-size/2)+'px;top:'+(cy-size/2)+'px;width:'+size+'px;height:'+size+'px;border-color:'+color.border+';';canvas.appendChild(ring);setTimeout(function(){ring.remove()},360);
    var fly=document.createElement('div');fly.className='sfly';fly.style.cssText='left:'+(cx-12)+'px;top:'+(cy-14)+'px;color:'+color.text+';';fly.textContent=mult>1?'+'+fp+' ('+mult+'x)':'+'+fp;canvas.appendChild(fly);setTimeout(function(){fly.remove()},560);
    var bObj=bubbles.find(function(b){return b.el===el});if(bObj){clearTimeout(bObj.timer);bubbles=bubbles.filter(function(b){return b!==bObj})}el.remove();
  }

  function updateCombo(){var pct=Math.min(combo/5*100,100);comboFill.style.width=pct+'%';if(combo>=5){comboFill.style.background='var(--mint)';comboLabel.style.background='var(--mint)';comboLabel.style.color='var(--mint-t)'}else if(combo>=3){comboFill.style.background='var(--peach)';comboLabel.style.background='var(--peach)';comboLabel.style.color='var(--peach-t)'}else{comboFill.style.background='var(--purple)';comboLabel.style.background='var(--purple)';comboLabel.style.color='var(--purple-t)'}comboLabel.textContent=combo+'x combo'}
  function saveHighScore(){var d=new Date();var ts=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});highScores.push({score:score,maxCombo:maxCombo,ts:ts});highScores.sort(function(a,b){return b.score-a.score});highScores=highScores.slice(0,5);localStorage.setItem('bpScores3',JSON.stringify(highScores));currentBest=highScores[0].score;renderHighScores(true);showBestPill()}
  function renderHighScores(markNew){if(!highScores.length){hsList.innerHTML='<div style="font-size:12px;color:var(--text2);padding:4px 0">play a round to set your first score!</div>';return}var rc=[{bg:'var(--peach)',text:'var(--peach-t)'},{bg:'var(--purple)',text:'var(--purple-t)'},{bg:'var(--lav)',text:'var(--lav-t)'},{bg:'var(--blue)',text:'var(--blue-t)'},{bg:'var(--mint)',text:'var(--mint-t)'}];hsList.innerHTML=highScores.map(function(h,i){var c=rc[i]||rc[4];var isThis=markNew&&h.score===score;return '<div class="hs-row"><div class="hs-rank" style="background:'+c.bg+';color:'+c.text+'">'+(i+1)+'</div><div class="hs-info">'+h.score+' pts'+(isThis&&i===0?' <span class="hs-new">new!</span>':'')+' <span class="hs-meta">'+h.maxCombo+'x combo · '+h.ts+'</span></div></div>'}).join('')}
  function addMuteBtn(){var mb=document.createElement('div');mb.className='mute-btn';mb.textContent=muted?'\u2715':'\u266A';mb.title=muted?'Sound off':'Sound on';mb.addEventListener('click',function(e){e.stopPropagation();muted=!muted;localStorage.setItem('bpMuted',muted?'1':'0');mb.textContent=muted?'\u2715':'\u266A';mb.title=muted?'Sound off':'Sound on'});canvas.appendChild(mb)}

  function showToast(msg){var t=document.createElement('div');t.className='copied-toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2000)}

  function shareScore(s,mc){
    var text='I scored '+s+' points in Bubble Pop! ('+mc+'x best combo) Can you beat me? ';
    var url=window.location.href;
    if(navigator.share){
      navigator.share({title:'Bubble Pop!',text:text,url:url}).catch(function(){})
    } else {
      navigator.clipboard.writeText(text+url).then(function(){showToast('copied to clipboard!')}).catch(function(){
        var ta=document.createElement('textarea');ta.value=text+url;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();showToast('copied to clipboard!')
      })
    }
  }
  window.shareScore=shareScore;

  function shareGame(){
    var text='try Bubble Pop! a cute bubble popping game ';
    var url=window.location.href;
    if(navigator.share){
      navigator.share({title:'Bubble Pop!',text:text,url:url}).catch(function(){})
    } else {
      navigator.clipboard.writeText(text+url).then(function(){showToast('link copied!')}).catch(function(){
        var ta=document.createElement('textarea');ta.value=text+url;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();showToast('link copied!')
      })
    }
  }
  window.shareGame=shareGame;

  function startGame(){score=0;timeLeft=30;combo=0;maxCombo=0;difficulty=1;hsBeaten=false;currentBest=highScores.length?highScores[0].score:0;scoreEl.textContent='0';timerEl.textContent='30';updateCombo();canvas.innerHTML='';addMuteBtn();bubbles.forEach(function(b){clearTimeout(b.timer)});bubbles=[];gameActive=true;startBtn.style.display='none';ensureAudio();gameInterval=setInterval(function(){timeLeft--;timerEl.textContent=timeLeft;if(timeLeft<=0)endGame()},1000);function sched(){if(!gameActive)return;spawnBubble();spawnTimeout=setTimeout(sched,Math.max(150,700-difficulty*40))}sched()}
  window.startGame=startGame;

  function endGame(){
    gameActive=false;clearInterval(gameInterval);clearTimeout(spawnTimeout);
    bubbles.forEach(function(b){clearTimeout(b.timer);if(b.el.parentNode)b.el.remove()});bubbles=[];
    var wasNew=currentBest>0&&score>=currentBest;var wasFirst=highScores.length===0;
    saveHighScore();var isTop=wasNew||wasFirst;
    if(isTop){playHighScore()}else{playGameOver()}
    var ov=document.createElement('div');ov.className='end-overlay';
    if(isTop){spawnConfetti(ov);ov.innerHTML+='<div class="end-crown"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M8 36h32l-4-20-8 8-4-12-4 12-8-8-4 20z" fill="var(--peach)" stroke="var(--peach-b)" stroke-width="1.5" stroke-linejoin="round"/><circle cx="16" cy="38" r="2" fill="var(--pink-t)"/><circle cx="24" cy="38" r="2" fill="var(--lav-t)"/><circle cx="32" cy="38" r="2" fill="var(--mint-t)"/></svg></div><div class="end-badge" style="color:var(--pink-t)">new high score!</div>'}
    else{ov.innerHTML+='<div class="end-badge">time is up!</div>'}
    ov.innerHTML+='<div class="end-score end-score-anim">'+score+'</div><div class="end-label">points</div><div class="end-meta">best combo '+maxCombo+'x</div><div class="end-btns"><button class="play-again-btn" onclick="startGame()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.5 15a9 9 0 105-13L1 10"/></svg>play again</button><button class="share-btn" onclick="shareScore('+score+','+maxCombo+')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>share</button></div>';
    canvas.appendChild(ov);startBtn.style.display='block';
  }

  splashBtn.addEventListener('click',function(){splash.remove();startGame()});
  startBtn.addEventListener('click',startGame);
  showBestPill();renderHighScores(false);
})();
</script>
